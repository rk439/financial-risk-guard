<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Financial Risk Guard - Interactive Agent Trace</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292f;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 3px 6px rgba(140,149,159,0.15);
        }
        h1 { font-size: 24px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        p.subtitle { color: #57606a; margin-top: 0; margin-bottom: 24px; }
        .badge { background: #dafbe1; color: #1a7f37; padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        
        .panel {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            padding: 20px;
            border-radius: 6px;
            height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }
        .line { margin-bottom: 8px; line-height: 1.5; opacity: 0; transform: translateY(5px); transition: all 0.3s ease; }
        .line.visible { opacity: 1; transform: translateY(0); }
        .system { color: #58a6ff; }
        .thought { color: #ff7b72; font-style: italic; }
        .action { color: #d2a8ff; font-weight: bold; }
        .observation { color: #7ee787; }
        .alert { color: #f85149; font-weight: bold; border-left: 4px solid #f85149; padding-left: 8px; margin-top: 12px; }

        .btn {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27,31,36,0.15);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { background-color: #2c974b; }
        .btn:disabled { background-color: #84cb95; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Customer Financial Risk Guard <span class="badge">Agent Live Trace</span></h1>
    <p class="subtitle">AI PM Portfolio Demonstration: Simulating a ReAct reasoning loop with RAG policy validation and MCP database interfaces.</p>
    
    <div class="panel" id="terminal">
        <div class="line system visible">> Press the button below to initiate the autonomous audit trace context...</div>
    </div>
    
    <button class="btn" id="runBtn" onclick="runSimulation()">⚡ Run Agent Simulation</button>
</div>

<script>
    const logs = [
        { text: "🚀 Starting Agent Framework for Query: 'Run financial compliance review for client Acme Corp before contract signature.'", type: "system" },
        { text: "\n🔄 --- ReAct Loop Iteration 1 ---", type: "system" },
        { text: "🧠 AI Thought: I need customer billing metrics to check for cost anomalies. Calling Tool...", type: "thought" },
        { text: "🛠️ Action: Calling MCP Database Tool via utils.get_customer_metrics()...", type: "action" },
        { text: "👁️ Observation: Retrieved customer billing data profile structure successfully.", type: "observation" },
        { text: "\n🔄 --- ReAct Loop Iteration 2 ---", type: "system" },
        { text: "🧠 AI Thought: I have metrics showing usage data. Now I need the corporate contract overage thresholds to verify alignment. Calling Tool...", type: "thought" },
        { text: "🛠️ Action: Triggering RAG Search via utils.read_pricing_policy()...", type: "action" },
        { text: "👁️ Observation: Local corporate policy rules pulled into active context memory.", type: "observation" },
        { text: "\n🔄 --- ReAct Loop Iteration 3 ---", type: "system" },
        { text: "🧠 AI Thought: I have all data dependencies satisfied. Synthesizing report constraints and verifying thresholds...", type: "thought" },
        { text: "\n📊 --- Compiling Final Risk Assessment Report ---", type: "system" },
        { text: "[🚨 HIGH RISK ALERT]<br>Customer Account: Acme Corp<br>Contract Status: Pending Renewal<br>Detected Storage Consumption: 7,200 GB (Baseline Allocation: 5,000 GB)<br>Calculated Overage Value: $220.00 USD<br>Infrastructure Resource Spike Ratio: 2.5x normal metrics<br>--------------------------------------------------<br>Strategic Account Recommendation:<br>Do NOT execute a flat-rate contract renewal. The infrastructure metrics match the pattern of 'Unmanaged Elastic Usage' (Section 2.2). Flag this account profile for immediate manager intervention.", type: "alert" }
    ];

    function runSimulation() {
        const terminal = document.getElementById("terminal");
        const btn = document.getElementById("runBtn");
        terminal.innerHTML = "";
        btn.disabled = true;
        
        let index = 0;
        
        function printLine() {
            if (index < logs.length) {
                const item = logs[index];
                const div = document.createElement("div");
                div.className = `line ${item.type}`;
                div.innerHTML = item.text.replace(/\n/g, "<br>");
                terminal.appendChild(div);
                
                // Trigger transition effect
                setTimeout(() => { div.classList.add("visible"); }, 50);
                
                terminal.scrollTop = terminal.scrollHeight;
                index++;
                setTimeout(printLine, 1200); // 1.2 second pause between actions for readability
            } else {
                btn.disabled = false;
                btn.innerText = "🔄 Re-run Simulation";
            }
        }
        printLine();
    }
</script>

</body>
</html>
