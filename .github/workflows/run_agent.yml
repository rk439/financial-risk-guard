name: Test Run Financial Agent
on: [workflow_dispatch]
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Script
        # This tells the cloud server to step inside your exact file subfolder first
        working-directory: ./financial-risk-guard
        run: python app.py
