name: Test Run Financial Agent
on: [workflow_dispatch]
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Script
        # This scans the workspace dynamically to launch the correct app file
        run: |
          python $(find . -name app.py | head -n 1)
